name: CSL自动化测试

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 安装Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: 安装项目依赖
      run: npm install

    - name: 运行CSL Schema验证
      run: npm run validate

    - name: 运行完整测试
      run: npm test